version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    volumes:
      - ../..:/workspaces:cached

    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    network_mode: "host"
volumes:
  # postgres_data:
  sysml_v2_server_data:
