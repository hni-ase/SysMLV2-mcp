# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          **/bin/
          **/obj/
        retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build
    # Continue even if tests fail - this ensures build job passes independently
    continue-on-error: true
    
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test with detailed reporting
      run: |
        dotnet test --no-build --verbosity normal \
          --logger "trx;LogFileName=test-results.trx" \
          --logger "console;verbosity=detailed" \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults
      continue-on-error: true
    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: .NET Test Results
        path: './TestResults/*.trx'
        reporter: dotnet-trx
        fail-on-error: false
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          ./TestResults/
        retention-days: 30
    - name: Display failed tests summary
      if: failure()
      run: |
        echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "Some tests have failed. Check the detailed test report above for specifics." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "./TestResults/test-results.trx" ]; then
          echo "### Test Results File Generated" >> $GITHUB_STEP_SUMMARY
          echo "- Test results are available in the artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Check the 'Test Results' tab for detailed failure information" >> $GITHUB_STEP_SUMMARY
        fi
